<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDA4AF"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="bg-clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- Deep background with mesh gradient -->
  <rect width="120" height="120" rx="26" fill="#1E1B4B"/>
  <g clip-path="url(#bg-clip)">
    <circle cx="28" cy="28" r="58" fill="#4338CA" opacity="0.4"/>
    <circle cx="92" cy="92" r="52" fill="#7C3AED" opacity="0.35"/>
    <circle cx="100" cy="18" r="32" fill="#6366F1" opacity="0.15"/>
  </g>

  <!-- Soft ambient glow -->
  <ellipse cx="58" cy="58" rx="34" ry="28" fill="#A78BFA" opacity="0.06"/>

  <!-- Card 1 (back) — Rose gradient, fanned left -->
  <g transform="rotate(-16 56 60)">
    <rect x="30" y="18" width="52" height="72" rx="12" fill="url(#c1)" opacity="0.6"/>
    <rect x="30" y="18" width="52" height="72" rx="12" stroke="white" stroke-width="0.7" fill="none" opacity="0.12"/>
  </g>

  <!-- Card 2 (middle) — Emerald gradient, centered -->
  <g transform="rotate(0 60 58)">
    <rect x="34" y="20" width="52" height="72" rx="12" fill="url(#c2)" opacity="0.66"/>
    <rect x="34" y="20" width="52" height="72" rx="12" stroke="white" stroke-width="0.7" fill="none" opacity="0.14"/>
  </g>

  <!-- Card 3 (front) — Blue gradient, fanned right -->
  <g transform="rotate(16 64 60)">
    <rect x="38" y="22" width="52" height="72" rx="12" fill="url(#c3)" opacity="0.82"/>
    <rect x="38" y="22" width="52" height="72" rx="12" stroke="white" stroke-width="0.8" fill="none" opacity="0.2"/>
    <!-- Glass highlight shimmer -->
    <rect x="39" y="23" width="50" height="26" rx="11" fill="white" opacity="0.07"/>
    <!-- Content lines -->
    <rect x="48" y="40" width="22" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
    <rect x="48" y="49" width="30" height="3.5" rx="1.75" fill="white" opacity="0.42"/>
    <rect x="48" y="58" width="16" height="3.5" rx="1.75" fill="white" opacity="0.32"/>
    <rect x="48" y="70" width="26" height="3.5" rx="1.75" fill="white" opacity="0.25"/>
    <rect x="48" y="79" width="20" height="3.5" rx="1.75" fill="white" opacity="0.2"/>
  </g>
</svg>
